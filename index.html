<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css">
    <link rel="stylesheet" href="/styles/copy-code.css?v=2">
    <link rel="stylesheet" href="/fonts.css">
    <link rel="stylesheet" href="/styles/siderbar-no-select.css?v=2">
    <style>
    body::-webkit-scrollbar {
        display: none;
    }
    </style>
</head>

<body>
    <div id="app"></div>
    <script src="/js_code/404.js"></script>
    <script>
        window.$docsify = {
            name: 'Main Page',
            repo: 'https://github.com/ClydeCole',
            loadSidebar: true,
            auto2top: true,
            search: {
                paths: 'auto',
                placeholder: 'Search',
                noData: 'Not font any thing'
            },
            plugins: [
                function(hook, vm) {
                    var EXCLUDE = ['/doc/java_learn/', '/doc/pyxl/', '/doc/日記/'];
                    hook.doneEach(function() {
                        var key = 'docsify.search.index';
                        var data = localStorage.getItem(key);
                        if (data) {
                            var indexes = JSON.parse(data);
                            var modified = false;
                            Object.keys(indexes).forEach(function(path) {
                                if (EXCLUDE.some(function(e) { return path.indexOf(e) !== -1; })) {
                                    delete indexes[path];
                                    modified = true;
                                }
                            });
                            modified && localStorage.setItem(key, JSON.stringify(indexes));
                        }
                    });
                }
            ],

            copyCode: {
                buttonText: 'Copy',
                errorText: 'Error',
                successText: 'Copied'
            },
            frontMatter: {
                installed: true,
                renderYAML: false // 關鍵：設置為 false 就不會渲染到網頁上
            },
            sidebarCollapse: {
                disableAccordion: true,  // 设置为 true，即可同时打开多个菜单
                sidebarDisplayLevel: 1
            },
        }
    </script>

    <!-- Docsify v4 -->
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <!-- Search -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <!-- Copy code -->
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <!-- 翻頁 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <!-- 漂亮的警示區塊 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
    <!-- Hidden Metadata -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/front-matter.min.js"></script>
    <!-- sidebar 折疊 -->
    <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
    <!-- bilibili video -->
    <script src="//cdn.jsdelivr.net/npm/docsify-bilibili@latest/bilibili.min.js"></script>

    <!-- language highlight -->
<!--    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>-->
<!--    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>-->
<!--    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>-->
</body>

</html>
